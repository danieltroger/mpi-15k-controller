name: Prettier Format

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  prettier:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run Prettier format
        run: yarn prettier --write .

      - name: Commit and push changes
        run: |
          git add -A
          git diff --staged --quiet || git commit -m "chore: format with prettier"
          git push
