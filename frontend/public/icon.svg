<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <!-- Kraftverket bolt — same path as the nav logotype and the generated PNG app icons (which
       stay for manifest/apple-touch use). Tab favicons get a theme-aware ground via the media
       query, something the PNGs can't do. -->
  <style>
    .ground { fill: #0e8a52; }
    @media (prefers-color-scheme: dark) {
      .ground { fill: #2fa36b; }
    }
  </style>
  <rect class="ground" width="16" height="16" rx="3.4" />
  <path
    d="M9 1 3 9.2h3.4L7 15l6-8.2H9.6L9 1Z"
    fill="#ffffff"
    transform="translate(8 8) scale(0.78) translate(-8 -8)"
  />
</svg>
